version: "3.8"

services:
  app:
    build: .
    container_name: nextjs-docs-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
